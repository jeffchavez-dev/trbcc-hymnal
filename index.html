<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRBCC Hymnal</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4a3728" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-Regular.ttf'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-Bold.ttf'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-Italic.ttf'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-BoldItalic.ttf'); font-weight: 700; font-style: italic; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow: hidden; height: 100%; }

    :root {
      --bg: #fdf8f0;
      --surface: #fff;
      --border: #e0d6c8;
      --accent: #4a3728;
      --accent-light: #7a5c48;
      --text: #2c1f14;
      --text-muted: #7a6a5a;
      --highlight: #f5e6c8;
      --radius: 8px;
      --font-size: 17px;
    }

    body {
      font-family: 'DroidSerif', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-size: var(--font-size);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 54px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .02em; flex: 1; }
    .header-btn {
      background: none; border: none; color: #fff; cursor: pointer;
      font-size: 1.3rem; padding: 6px; border-radius: 4px; line-height: 1;
      transition: background .15s;
    }
    .header-btn:hover { background: rgba(255,255,255,.15); }

    /* ── Layout ── */
    .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 54px); }

    /* ── Sidebar ── */
    aside {
      width: 320px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .2s, min-width .2s;
    }
    aside.collapsed { width: 0; min-width: 0; border-right: none; }

    .sidebar-top { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }


    .search-row { display: flex; gap: 6px; }
    .search-row input {
      flex: 1; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: var(--radius); font-family: inherit; font-size: .9rem;
      background: var(--bg); color: var(--text); outline: none;
    }
    .search-row input:focus { border-color: var(--accent-light); }
    .search-row button {
      padding: 7px 10px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--bg); cursor: pointer;
      font-size: .85rem; color: var(--text-muted);
    }
    .search-row button:hover { background: var(--highlight); }

    .search-opts { display: flex; gap: 10px; flex-wrap: wrap; }
    .search-opts label { display: flex; align-items: center; gap: 4px; font-size: .78rem; color: var(--text-muted); cursor: pointer; }

    .hymn-list { overflow-y: auto; flex: 1; overscroll-behavior: contain; }
    .hymn-item {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: background .1s;
    }
    .hymn-item:hover { background: var(--highlight); }
    .hymn-item.active { background: var(--highlight); border-left: 3px solid var(--accent); padding-left: 11px; }
    .hymn-item.bookmarked .hymn-num::after { content: ' ★'; color: goldenrod; }
    .hymn-num { font-size: .8rem; color: var(--text-muted); min-width: 32px; font-weight: 700; flex-shrink: 0; }
    .hymn-title { font-size: .9rem; line-height: 1.35; flex: 1; }

    /* ── Playlist badge ── */
    .pl-badge {
      min-width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: .7rem; font-weight: 700; line-height: 20px;
      text-align: center; flex-shrink: 0; display: none;
    }
    .select-mode .pl-badge { display: block; }
    .select-mode .hymn-item.in-playlist { background: var(--highlight); }
    .select-mode .hymn-item.in-playlist .pl-badge { opacity: 1; }
    .select-mode .hymn-item:not(.in-playlist) .pl-badge { background: var(--border); }

    /* ── Playlist footer bar ── */
    .playlist-footer {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: none;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
    }
    .playlist-footer.visible { display: flex; }
    .playlist-footer .pl-info { font-size: .82rem; color: var(--text-muted); }
    .playlist-footer .pl-actions { display: flex; gap: 6px; }
    .playlist-footer button {
      flex: 1; padding: 7px 8px; border-radius: var(--radius);
      border: 1px solid var(--border); font-family: inherit;
      font-size: .82rem; cursor: pointer; background: var(--bg); color: var(--text);
    }
    .playlist-footer .pl-play-btn {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .playlist-footer .pl-play-btn:disabled { opacity: .5; cursor: default; }

    /* ── Select mode toggle ── */
    .select-toggle {
      display: flex; justify-content: flex-end;
    }
    .select-toggle button {
      padding: 4px 10px; border: 1px solid var(--border);
      border-radius: var(--radius); background: none; cursor: pointer;
      font-family: inherit; font-size: .78rem; color: var(--text-muted);
    }
    .select-toggle button.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── Player bar — now shows playlist position ── */
    .player-pos { font-size: .75rem; opacity: .75; white-space: nowrap; }

    /* ── Main viewer ── */
    main {
      flex: 1;
      min-width: 0;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 28px 32px 60px;
    }

    #hymnView {
      max-width: 620px;
      margin: 0 auto;
    }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-muted);
      gap: 12px; text-align: center;
    }
    .empty-state .icon { font-size: 3rem; }

    .hymn-header { margin-bottom: 20px; }
    .hymn-header .number { font-size: .85rem; color: var(--text-muted); margin-bottom: 4px; }
    .hymn-header h2 { font-size: 1.4rem; line-height: 1.3; }
    .hymn-header .collection-badge {
      display: inline-block; margin-top: 6px;
      font-size: .72rem; font-style: normal; padding: 2px 8px;
      border-radius: 20px; background: var(--highlight); color: var(--accent);
      border: 1px solid var(--border);
    }

    .hymn-body { white-space: pre-wrap; line-height: 1.85; letter-spacing: .01em; }
    .hymn-body .stanza { margin-bottom: 1.4em; }

    .viewer-toolbar {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .viewer-toolbar button {
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface);
      cursor: pointer; font-family: inherit; font-size: .85rem;
      color: var(--text); transition: background .15s;
    }
    .viewer-toolbar button:hover { background: var(--highlight); }
    .viewer-toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .font-ctrl { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .font-ctrl button { padding: 5px 10px; font-size: 1rem; font-weight: 700; }
    .font-ctrl span { min-width: 36px; text-align: center; font-size: .8rem; color: var(--text-muted); }

    /* ── MIDI player ── */
    .player-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--accent);
      color: #fff;
      padding: 8px 20px;
      display: flex; align-items: center; gap: 12px;
      font-size: .85rem;
      transform: translateY(100%);
      transition: transform .25s;
      z-index: 50;
    }
    .player-bar.visible { transform: translateY(0); }
    .player-bar .play-btn {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .player-bar .play-btn:hover { background: rgba(255,255,255,.35); }
    .player-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-close { background: none; border: none; color: rgba(255,255,255,.7); cursor: pointer; font-size: 1.2rem; }

    /* ── No results ── */
    .no-results { padding: 20px; text-align: center; color: var(--text-muted); font-style: italic; }


    /* ── Responsive ── */
    @media (max-width: 640px) {
      aside { width: 100%; position: absolute; top: 54px; bottom: 0; z-index: 90; }
      aside.collapsed { width: 0; overflow: hidden; }
      main { padding: 16px 16px 80px; }
    }
  </style>
</head>
<body>



<header>
  <button class="header-btn" id="sidebarToggle" title="Toggle hymn list">☰</button>
  <h1>TRBCC Hymnal</h1>
  <button class="header-btn" id="bookmarkBtn" title="Bookmark this hymn" style="display:none">☆</button>
</header>

<div class="app">
  <aside id="sidebar">
    <div class="sidebar-top">
      <div class="search-row">
        <input type="search" id="searchInput" placeholder="Search hymns…" autocomplete="off" />
        <button id="clearSearch">✕</button>
      </div>
      <div class="search-opts">
        <label><input type="checkbox" id="optCase"> Case-sensitive</label>
        <label><input type="checkbox" id="optFirstLine"> First line only</label>
        <label><input type="checkbox" id="optIgnorePunct" checked> Ignore punctuation</label>
      </div>
      <div class="select-toggle">
        <button id="selectModeBtn">+ Playlist</button>
      </div>
    </div>
    <div class="hymn-list" id="hymnList"></div>
    <div class="playlist-footer" id="playlistFooter">
      <div class="pl-info" id="plInfo">0 hymns selected</div>
      <div class="pl-actions">
        <button id="plClearBtn">Clear</button>
        <button class="pl-play-btn" id="plPlayBtn" disabled>▶ Play All</button>
      </div>
    </div>
  </aside>

  <main id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="icon">♪</div>
      <div>Select a hymn to begin reading</div>
    </div>
    <div id="hymnView" style="display:none">
      <div class="viewer-toolbar">
        <button id="prevHymn">← Prev</button>
        <button id="nextHymn">Next →</button>
        <button id="playBtn">▶ Play</button>
        <div class="font-ctrl">
          <button id="fontDec">A−</button>
          <span id="fontSizeLabel">17px</span>
          <button id="fontInc">A+</button>
        </div>
      </div>
      <div class="hymn-header">
        <div class="number" id="hymnNumber"></div>
        <h2 id="hymnTitle"></h2>
        <em class="collection-badge" id="hymnCollection"></em>
      </div>
      <div class="hymn-body" id="hymnBody"></div>
    </div>
  </main>
</div>

<div class="player-bar" id="playerBar">
  <button class="play-btn" id="playerPlayPause">▶</button>
  <span class="player-title" id="playerTitle">—</span>
  <span class="player-pos" id="playerPos"></span>
  <button class="player-close" id="playerClose">✕</button>
</div>

<script>
'use strict';

// ── Hymns that have no audio in the original APK ──────────────────────
const NO_AUDIO_IDS = new Set([
  '731','732','733','734','735','736','737','738','739','740',
  '741','741s','742','743','744','745','746','747','748','749','750',
  '751','752','753','754','755','756','757','757s','758','758s',
  '759','760','760s','761','762','762s','763','764','765','766','766s',
  '767','768','769','770','771','771s','772','773','774','775','776',
  '777','778','779','780','781','782','783','784','785','786','787',
  '788','789','790','791','792','793'
]);

// ── State ──────────────────────────────────────────────────────────────
let allHymns = [];   // single merged + sorted list
let currentIndex = null;
let filteredList = [];
let fontSize = parseInt(localStorage.getItem('fontSize') || '17');
let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '{}');
let currentMidi = null;
let midiPlayer = null;

// ── Playlist state ─────────────────────────────────────────────────────
let selectMode = false;
let playlist = [];       // ordered array of hymn objects
let playlistPos = -1;    // current position while playing

// ── Boot — use XHR for maximum iOS compatibility ────────────────────────
(function() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'hymns.json', true);
  xhr.onload = function() {
    var data = JSON.parse(xhr.responseText);
    allHymns = data.trinity.concat(data.grace)
      .sort(function(a, b) { return parseInt(a.id) - parseInt(b.id); });
    applyFontSize();
    renderList();
  };
  xhr.send();
}());

// ── Sidebar toggle ─────────────────────────────────────────────────────
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

// ── Playlist ────────────────────────────────────────────────────────────
function updatePlaylistUI() {
  const footer = document.getElementById('playlistFooter');
  const info = document.getElementById('plInfo');
  const playBtn = document.getElementById('plPlayBtn');
  const toggleBtn = document.getElementById('selectModeBtn');

  toggleBtn.textContent = selectMode ? '✕ Done' : '+ Playlist';
  toggleBtn.classList.toggle('active', selectMode);
  footer.classList.toggle('visible', selectMode);

  const withAudio = playlist.filter(function(h) { return !NO_AUDIO_IDS.has(h.id); });
  info.textContent = playlist.length + ' hymn' + (playlist.length !== 1 ? 's' : '') + ' selected' +
    (withAudio.length < playlist.length ? ' (' + withAudio.length + ' with audio)' : '');
  playBtn.disabled = withAudio.length === 0;
}

document.getElementById('selectModeBtn').addEventListener('click', function() {
  selectMode = !selectMode;
  document.getElementById('hymnList').classList.toggle('select-mode', selectMode);
  updatePlaylistUI();
  renderList();
});

document.getElementById('plClearBtn').addEventListener('click', function() {
  playlist = [];
  updatePlaylistUI();
  renderList();
});

document.getElementById('plPlayBtn').addEventListener('click', function() {
  var withAudio = playlist.filter(function(h) { return !NO_AUDIO_IDS.has(h.id); });
  if (withAudio.length === 0) return;
  playlistPos = 0;
  unlockAudio();
  playPlaylistItem(playlistPos, withAudio);
  // close sidebar on mobile
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('collapsed');
  }
});

function playPlaylistItem(pos, list) {
  var hymn = list[pos];
  if (!hymn) return;
  selectHymn(filteredList.indexOf(hymn));
  var folder = hymn.collection === 'trinity' ? 'midi1' : 'midi2';
  document.getElementById('playerPos').textContent = (pos + 1) + ' / ' + list.length;
  loadMidi(folder + '/h' + hymn.id + '.mid', hymn.firstLine, function() {
    // on finish, auto-advance
    if (pos + 1 < list.length) {
      playlistPos = pos + 1;
      playPlaylistItem(playlistPos, list);
    } else {
      document.getElementById('playerPos').textContent = '';
      playlistPos = -1;
    }
  });
}

// ── Search ─────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', renderList);
document.getElementById('clearSearch').addEventListener('click', () => { searchInput.value = ''; renderList(); });
document.getElementById('optCase').addEventListener('change', renderList);
document.getElementById('optFirstLine').addEventListener('change', renderList);
document.getElementById('optIgnorePunct').addEventListener('change', renderList);

function normalize(str) {
  const ignorePunct = document.getElementById('optIgnorePunct').checked;
  const caseSensitive = document.getElementById('optCase').checked;
  let s = str;
  if (ignorePunct) s = s.replace(/[^\w\s]/g, '');
  if (!caseSensitive) s = s.toLowerCase();
  return s;
}

function renderList() {
  const query = searchInput.value.trim();
  const firstLineOnly = document.getElementById('optFirstLine').checked;
  const list = document.getElementById('hymnList');

  let source = allHymns;

  if (query) {
    const q = normalize(query);
    source = source.filter(function(h) {
      const haystack = firstLineOnly ? normalize(h.firstLine) : normalize(h.text);
      return haystack.indexOf(q) !== -1;
    });
  }

  filteredList = source;

  if (source.length === 0) {
    list.innerHTML = '<div class="no-results">No hymns found</div>';
    return;
  }

  list.innerHTML = source.map(function(h, i) {
    const key = h.collection + ':' + h.id;
    const isActive = currentIndex !== null && filteredList[currentIndex] === h;
    const isBookmarked = bookmarks[key];
    const plIdx = playlist.indexOf(h);
    const inPlaylist = plIdx !== -1;
    const badge = plIdx !== -1 ? (plIdx + 1) : '';
    return '<div class="hymn-item' +
      (isActive ? ' active' : '') +
      (isBookmarked ? ' bookmarked' : '') +
      (inPlaylist ? ' in-playlist' : '') +
      '" data-idx="' + i + '">' +
      '<span class="hymn-num">#' + h.id + '</span>' +
      '<span class="hymn-title">' + escHtml(h.firstLine) + '</span>' +
      '<span class="pl-badge">' + badge + '</span>' +
      '</div>';
  }).join('');

  list.querySelectorAll('.hymn-item').forEach(function(el) {
    el.addEventListener('click', function() {
      const idx = parseInt(el.dataset.idx);
      if (selectMode) {
        const hymn = filteredList[idx];
        const pos = playlist.indexOf(hymn);
        if (pos === -1) {
          playlist.push(hymn);
        } else {
          playlist.splice(pos, 1);
        }
        updatePlaylistUI();
        renderList();
      } else {
        selectHymn(idx);
      }
    });
  });
}

function currentHymnKey() {
  if (currentIndex === null || !filteredList[currentIndex]) return null;
  const h = filteredList[currentIndex];
  return `${h.collection}:${h.id}`;
}

// ── Hymn viewer ────────────────────────────────────────────────────────
function selectHymn(idx) {
  currentIndex = idx;
  const hymn = filteredList[idx];
  if (!hymn) return;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('hymnView').style.display = 'block';
  document.getElementById('hymnNumber').textContent =
    `Hymn #${hymn.id}`;
  document.getElementById('hymnTitle').textContent = hymn.firstLine;
  document.getElementById('hymnCollection').textContent =
    hymn.collection === 'trinity' ? 'Trinity Hymnal – Baptist Edition' : 'Grace Hymns';
  document.getElementById('hymnBody').innerHTML = formatLyrics(hymn.text);

  // bookmark button
  const bkBtn = document.getElementById('bookmarkBtn');
  bkBtn.style.display = '';
  updateBookmarkBtn(hymn);

  // update play button availability
  const hasMidi = !NO_AUDIO_IDS.has(hymn.id);
  document.getElementById('playBtn').style.display = hasMidi ? '' : 'none';

  // scroll main to top
  document.getElementById('mainContent').scrollTop = 0;

  // highlight active in list
  renderList();

  // on mobile close sidebar
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('collapsed');
  }
}

function formatLyrics(text) {
  return text.split(/\n\n+/).map(stanza =>
    `<div class="stanza">${escHtml(stanza)}</div>`
  ).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Prev / Next ────────────────────────────────────────────────────────
document.getElementById('prevHymn').addEventListener('click', () => {
  if (currentIndex > 0) selectHymn(currentIndex - 1);
});
document.getElementById('nextHymn').addEventListener('click', () => {
  if (currentIndex < filteredList.length - 1) selectHymn(currentIndex + 1);
});

// ── Bookmarks ──────────────────────────────────────────────────────────
document.getElementById('bookmarkBtn').addEventListener('click', () => {
  const hymn = filteredList[currentIndex];
  if (!hymn) return;
  const key = `${hymn.collection}:${hymn.id}`;
  if (bookmarks[key]) delete bookmarks[key];
  else bookmarks[key] = true;
  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
  updateBookmarkBtn(hymn);
  renderList();
});

function updateBookmarkBtn(hymn) {
  const key = `${hymn.collection}:${hymn.id}`;
  document.getElementById('bookmarkBtn').textContent = bookmarks[key] ? '★' : '☆';
  document.getElementById('bookmarkBtn').title = bookmarks[key] ? 'Remove bookmark' : 'Bookmark';
}

// ── Font size ──────────────────────────────────────────────────────────
function applyFontSize() {
  document.body.style.fontSize = fontSize + 'px';
  document.getElementById('fontSizeLabel').textContent = fontSize + 'px';
}
document.getElementById('fontInc').addEventListener('click', () => { fontSize = Math.min(fontSize + 1, 28); applyFontSize(); localStorage.setItem('fontSize', fontSize); });
document.getElementById('fontDec').addEventListener('click', () => { fontSize = Math.max(fontSize - 1, 12); applyFontSize(); localStorage.setItem('fontSize', fontSize); });

// ── MIDI playback via midi-player-js + soundfont-player ───────────────
let midiPlayerLib = null;   // MidiPlayer.Player instance
let audioContext = null;
let instrument = null;
let isPlaying = false;
let currentMidiTitle = '';

function getAudioContext() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  return audioContext;
}

// iOS requires AudioContext to be created AND unlocked within the same
// synchronous user-gesture call. Play a silent buffer to satisfy that.
function unlockAudio() {
  const ctx = getAudioContext();
  if (ctx.state === 'suspended') ctx.resume();
  const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  return ctx;
}

function setPlayerState(playing) {
  isPlaying = playing;
  document.getElementById('playerPlayPause').textContent = playing ? '⏸' : '▶';
}

document.getElementById('playBtn').addEventListener('click', () => {
  const hymn = filteredList[currentIndex];
  if (!hymn) return;
  unlockAudio(); // must happen synchronously inside the gesture on iOS
  const folder = hymn.collection === 'trinity' ? 'midi1' : 'midi2';
  const src = folder + '/h' + hymn.id + '.mid';
  loadMidi(src, hymn.firstLine, null);
});

document.getElementById('playerPlayPause').addEventListener('click', () => {
  if (!midiPlayerLib) return;
  if (isPlaying) {
    midiPlayerLib.pause();
    setPlayerState(false);
  } else {
    unlockAudio(); // re-unlock in case context was suspended
    midiPlayerLib.play();
    setPlayerState(true);
  }
});

document.getElementById('playerClose').addEventListener('click', stopMidi);

function stopMidi() {
  if (midiPlayerLib) { midiPlayerLib.stop(); }
  setPlayerState(false);
  document.getElementById('playerBar').classList.remove('visible');
  document.getElementById('playerPos').textContent = '';
  playlistPos = -1;
}

function loadMidi(src, title, onFinish) {
  stopMidi();
  document.getElementById('playBtn').textContent = '⏳ Loading…';
  document.getElementById('playBtn').disabled = true;

  var ctx = getAudioContext();
  var playBtn = document.getElementById('playBtn');

  function onError(e) {
    console.error(e);
    playBtn.textContent = '▶ Play';
    playBtn.disabled = false;
  }

  function startPlayback(arrayBuf) {
    midiPlayerLib = new MidiPlayer.Player(function(event) {
      if (event.name !== 'Note on' || event.velocity === 0 || !instrument) return;
      var midi = event.noteNumber;
      var nearest = instrument._midiKeys.reduce(function(prev, cur) {
        return Math.abs(cur - midi) < Math.abs(prev - midi) ? cur : prev;
      });
      var cents = (midi - nearest) * 100;
      instrument.start(nearest, ctx.currentTime, {
        gain: event.velocity / 127,
        cents: cents
      });
    });

    midiPlayerLib.on('endOfFile', function() {
      setPlayerState(false);
      document.getElementById('playerPlayPause').textContent = '▶';
      if (onFinish) onFinish();
    });

    midiPlayerLib.loadArrayBuffer(arrayBuf);
    midiPlayerLib.play();
    setPlayerState(true);

    document.getElementById('playerTitle').textContent = title;
    document.getElementById('playerBar').classList.add('visible');
    playBtn.textContent = '▶ Play';
    playBtn.disabled = false;
  }

  function loadAndPlay() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', src, true);
    xhr.responseType = 'arraybuffer';
    xhr.onload = function() {
      if (xhr.status === 200) {
        startPlayback(xhr.response);
      } else {
        onError('MIDI not found: ' + src);
      }
    };
    xhr.onerror = onError;
    xhr.send();
  }

  if (instrument) {
    loadAndPlay();
  } else {
    Soundfont.instrument(ctx, 'acoustic_grand_piano', {
      nameToUrl: function(name, sf, format) { return '/soundfont/' + name + '-' + format + '.js'; },
      format: 'mp3'
    }).then(function(inst) {
      instrument = inst;
      instrument._midiKeys = Object.keys(instrument.buffers).map(Number).sort(function(a, b) { return a - b; });
      loadAndPlay();
    }).catch(onError);
  }
}
</script>
