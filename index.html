<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRBCC Hymnal</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4a3728" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-Regular.ttf'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-Bold.ttf'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-Italic.ttf'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'DroidSerif'; src: url('fonts/droidSerif-BoldItalic.ttf'); font-weight: 700; font-style: italic; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow: hidden; height: 100%; }

    :root {
      --bg: #fdf8f0;
      --surface: #fff;
      --border: #e0d6c8;
      --accent: #4a3728;
      --accent-light: #7a5c48;
      --text: #2c1f14;
      --text-muted: #7a6a5a;
      --highlight: #f5e6c8;
      --radius: 8px;
    }

    body {
      font-family: 'DroidSerif', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--accent); color: #fff;
      padding: 0 16px;
      display: flex; align-items: center; gap: 12px;
      height: 54px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .02em; flex: 1; }
    .header-btn {
      background: none; border: none; color: #fff; cursor: pointer;
      font-size: 1.3rem; padding: 6px; border-radius: 4px; line-height: 1;
      transition: background .15s;
    }
    .header-btn:hover { background: rgba(255,255,255,.15); }

    /* ── Layout ── */
    .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 54px); }

    /* ── Sidebar ── */
    aside {
      width: 320px; min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width .2s, min-width .2s;
    }
    aside.collapsed { width: 0; min-width: 0; border-right: none; }

    /* ── Sidebar tabs ── */
    .sidebar-tabs {
      display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .stab {
      flex: 1; padding: 10px 4px; border: none; background: none;
      font-family: inherit; font-size: .85rem; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .stab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* ── Panels ── */
    .panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .panel.hidden { display: none; }

    /* ── Hymns panel ── */
    .sidebar-top { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .search-row { display: flex; gap: 6px; }
    .search-row input {
      flex: 1; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: var(--radius); font-family: inherit; font-size: .9rem;
      background: var(--bg); color: var(--text); outline: none;
    }
    .search-row input:focus { border-color: var(--accent-light); }
    .search-row button {
      padding: 7px 10px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--bg); cursor: pointer;
      font-size: .85rem; color: var(--text-muted);
    }
    .search-row button:hover { background: var(--highlight); }
    .search-opts { display: flex; gap: 10px; flex-wrap: wrap; }
    .search-opts label { display: flex; align-items: center; gap: 4px; font-size: .78rem; color: var(--text-muted); cursor: pointer; }

    /* ── Edit banner (shown when editing a playlist) ── */
    .edit-banner {
      display: none; padding: 8px 12px;
      background: var(--highlight); border-bottom: 1px solid var(--border);
      font-size: .82rem; gap: 6px; align-items: center; flex-shrink: 0;
    }
    .edit-banner.visible { display: flex; }
    .edit-banner span { flex: 1; color: var(--accent); font-weight: 700; }
    .edit-banner button {
      padding: 4px 10px; border-radius: var(--radius); border: 1px solid var(--border);
      font-family: inherit; font-size: .78rem; cursor: pointer; background: var(--surface);
    }
    .edit-banner .save-btn { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Hymn list ── */
    .hymn-list { overflow-y: auto; flex: 1; overscroll-behavior: contain; }
    .hymn-item {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: background .1s;
    }
    .hymn-item:hover { background: var(--highlight); }
    .hymn-item.active { background: var(--highlight); border-left: 3px solid var(--accent); padding-left: 11px; }
    .hymn-item.bookmarked .hymn-num::after { content: ' ★'; color: goldenrod; }
    .hymn-num { font-size: .8rem; color: var(--text-muted); min-width: 32px; font-weight: 700; flex-shrink: 0; }
    .hymn-title { font-size: .9rem; line-height: 1.35; flex: 1; }
    .pl-badge {
      min-width: 20px; height: 20px; border-radius: 50%;
      background: var(--border); color: var(--text-muted);
      font-size: .7rem; font-weight: 700; line-height: 20px;
      text-align: center; flex-shrink: 0; display: none;
    }
    .editing-mode .pl-badge { display: block; }
    .editing-mode .hymn-item.in-edit { background: var(--highlight); }
    .editing-mode .hymn-item.in-edit .pl-badge { background: var(--accent); color: #fff; }

    /* ── No results ── */
    .no-results { padding: 20px; text-align: center; color: var(--text-muted); font-style: italic; }

    /* ── Playlists panel ── */
    .playlists-header {
      padding: 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .playlists-header h3 { flex: 1; font-size: .9rem; color: var(--text-muted); font-weight: 400; }
    .new-pl-btn {
      padding: 6px 12px; border-radius: var(--radius);
      background: var(--accent); color: #fff; border: none;
      font-family: inherit; font-size: .82rem; cursor: pointer;
    }
    .playlists-list { overflow-y: auto; flex: 1; overscroll-behavior: contain; }
    .pl-item {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
    }
    .pl-item-top { display: flex; align-items: center; gap: 8px; }
    .pl-item-name { flex: 1; font-size: .95rem; font-weight: 700; }
    .pl-item-meta { font-size: .78rem; color: var(--text-muted); }
    .pl-item-actions { display: flex; gap: 6px; }
    .pl-item-actions button {
      padding: 4px 10px; border-radius: var(--radius);
      border: 1px solid var(--border); font-family: inherit;
      font-size: .78rem; cursor: pointer; background: var(--bg); color: var(--text);
    }
    .pl-item-actions .pl-play { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pl-item-actions .pl-play:disabled { opacity: .4; cursor: default; }
    .pl-item-actions .pl-delete { color: #c0392b; border-color: #e0b0a8; }
    .pl-empty { padding: 32px 20px; text-align: center; color: var(--text-muted); font-style: italic; font-size: .9rem; }

    /* ── Main viewer ── */
    main {
      flex: 1; min-width: 0;
      overflow-x: hidden; overflow-y: auto;
      padding: 28px 32px 60px;
    }
    #hymnView { max-width: 620px; margin: 0 auto; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-muted);
      gap: 12px; text-align: center;
    }
    .empty-state .icon { font-size: 3rem; }
    .hymn-header { margin-bottom: 20px; }
    .hymn-header .number { font-size: .85rem; color: var(--text-muted); margin-bottom: 4px; }
    .hymn-header h2 { font-size: 1.4rem; line-height: 1.3; }
    .hymn-header .collection-badge {
      display: inline-block; margin-top: 6px;
      font-size: .72rem; font-style: normal; padding: 2px 8px;
      border-radius: 20px; background: var(--highlight); color: var(--accent);
      border: 1px solid var(--border);
    }
    .hymn-body { white-space: pre-wrap; line-height: 1.85; letter-spacing: .01em; }
    .hymn-body .stanza { margin-bottom: 1.4em; }

    .viewer-toolbar {
      display: flex; gap: 8px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
    }
    .viewer-toolbar button {
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface);
      cursor: pointer; font-family: inherit; font-size: .85rem;
      color: var(--text); transition: background .15s;
    }
    .viewer-toolbar button:hover { background: var(--highlight); }
    .font-ctrl { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .font-ctrl button { padding: 5px 10px; font-size: .9rem; font-weight: 700; }

    /* ── MIDI player bar ── */
    .player-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--accent); color: #fff;
      padding: 8px 20px;
      display: flex; align-items: center; gap: 12px;
      font-size: .85rem;
      transform: translateY(100%); transition: transform .25s;
      z-index: 50;
    }
    .player-bar.visible { transform: translateY(0); }
    .player-bar .play-btn {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .player-bar .play-btn:hover { background: rgba(255,255,255,.35); }
    .player-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-pos { font-size: .75rem; opacity: .75; white-space: nowrap; }
    .player-close { background: none; border: none; color: rgba(255,255,255,.7); cursor: pointer; font-size: 1.2rem; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      aside { width: 100%; position: absolute; top: 54px; bottom: 0; z-index: 90; }
      aside.collapsed { width: 0; overflow: hidden; }
      main { padding: 16px 16px 80px; }
    }
  </style>
</head>
<body>

<header>
  <button class="header-btn" id="sidebarToggle" title="Toggle list">☰</button>
  <h1>TRBCC Hymnal</h1>
  <button class="header-btn" id="bookmarkBtn" title="Bookmark" style="display:none">☆</button>
</header>

<div class="app">
  <aside id="sidebar">

    <div class="sidebar-tabs">
      <button class="stab active" id="tabHymns">Hymns</button>
      <button class="stab" id="tabPlaylists">Playlists</button>
    </div>

    <!-- ── Hymns Panel ── -->
    <div class="panel" id="hymnsPanel">
      <div class="sidebar-top">
        <div class="search-row">
          <input type="search" id="searchInput" placeholder="Search or #number…" autocomplete="off" />
          <button id="clearSearch">✕</button>
        </div>
        <div class="search-opts">
          <label><input type="checkbox" id="optCase"> Case-sensitive</label>
          <label><input type="checkbox" id="optFirstLine"> First line only</label>
          <label><input type="checkbox" id="optIgnorePunct" checked> Ignore punctuation</label>
        </div>
      </div>
      <div class="edit-banner" id="editBanner">
        <span id="editBannerLabel">Editing playlist</span>
        <button id="cancelEditBtn">Cancel</button>
        <button class="save-btn" id="saveEditBtn">Save</button>
      </div>
      <div class="hymn-list" id="hymnList"></div>
    </div>

    <!-- ── Playlists Panel ── -->
    <div class="panel hidden" id="playlistsPanel">
      <div class="playlists-header">
        <h3>My Playlists</h3>
        <button class="new-pl-btn" id="newPlaylistBtn">+ New</button>
      </div>
      <div class="playlists-list" id="playlistsList"></div>
    </div>

  </aside>

  <main id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="icon">♪</div>
      <div>Select a hymn to begin reading</div>
    </div>
    <div id="hymnView" style="display:none">
      <div class="viewer-toolbar">
        <button id="prevHymn" title="Previous">←</button>
        <button id="nextHymn" title="Next">→</button>
        <button id="playBtn" title="Play">▶</button>
        <div class="font-ctrl">
          <button id="fontDec" title="Decrease font">A−</button>
          <button id="fontInc" title="Increase font">A+</button>
        </div>
      </div>
      <div class="hymn-header">
        <div class="number" id="hymnNumber"></div>
        <h2 id="hymnTitle"></h2>
        <em class="collection-badge" id="hymnCollection"></em>
      </div>
      <div class="hymn-body" id="hymnBody"></div>
    </div>
  </main>
</div>

<div class="player-bar" id="playerBar">
  <button class="play-btn" id="playerPlayPause">▶</button>
  <span class="player-title" id="playerTitle">—</span>
  <span class="player-pos" id="playerPos"></span>
  <button class="player-close" id="playerClose">✕</button>
</div>

<script>
'use strict';

// ── Hymns with no audio in original APK ───────────────────────────────
var NO_AUDIO_IDS = {'731':1,'732':1,'733':1,'734':1,'735':1,'736':1,'737':1,'738':1,'739':1,'740':1,
  '741':1,'741s':1,'742':1,'743':1,'744':1,'745':1,'746':1,'747':1,'748':1,'749':1,'750':1,
  '751':1,'752':1,'753':1,'754':1,'755':1,'756':1,'757':1,'757s':1,'758':1,'758s':1,
  '759':1,'760':1,'760s':1,'761':1,'762':1,'762s':1,'763':1,'764':1,'765':1,'766':1,'766s':1,
  '767':1,'768':1,'769':1,'770':1,'771':1,'771s':1,'772':1,'773':1,'774':1,'775':1,'776':1,
  '777':1,'778':1,'779':1,'780':1,'781':1,'782':1,'783':1,'784':1,'785':1,'786':1,'787':1,
  '788':1,'789':1,'790':1,'791':1,'792':1,'793':1};

function hasAudio(h) { return !NO_AUDIO_IDS[h.id]; }

// ── State ─────────────────────────────────────────────────────────────
var allHymns = [];
var currentIndex = null;
var filteredList = [];
var fontSize = parseInt(localStorage.getItem('fontSize') || '17');
var bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '{}');

// ── Playlists ─────────────────────────────────────────────────────────
var savedPlaylists = JSON.parse(localStorage.getItem('savedPlaylists') || '[]');
var editingPlaylist = null;   // playlist object being edited (null = not editing)
var editHymns = [];           // working copy of hymn keys during edit
var activePlayPos = -1;       // position in currently playing playlist

function savePlaylists() {
  localStorage.setItem('savedPlaylists', JSON.stringify(savedPlaylists));
}

function hymnKey(h) { return h.collection + ':' + h.id; }

function hymnByKey(key) {
  var parts = key.split(':');
  for (var i = 0; i < allHymns.length; i++) {
    if (allHymns[i].collection === parts[0] && allHymns[i].id === parts[1]) return allHymns[i];
  }
  return null;
}

// ── Boot ──────────────────────────────────────────────────────────────
(function() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'hymns.json', true);
  xhr.onload = function() {
    var data = JSON.parse(xhr.responseText);
    allHymns = data.trinity.concat(data.grace)
      .sort(function(a, b) { return parseInt(a.id) - parseInt(b.id); });
    applyFontSize();
    renderList();
  };
  xhr.send();
}());

// ── Sidebar toggle ────────────────────────────────────────────────────
document.getElementById('sidebarToggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

// ── Tab switching ─────────────────────────────────────────────────────
document.getElementById('tabHymns').addEventListener('click', function() {
  document.getElementById('tabHymns').classList.add('active');
  document.getElementById('tabPlaylists').classList.remove('active');
  document.getElementById('hymnsPanel').classList.remove('hidden');
  document.getElementById('playlistsPanel').classList.add('hidden');
});

document.getElementById('tabPlaylists').addEventListener('click', function() {
  document.getElementById('tabPlaylists').classList.add('active');
  document.getElementById('tabHymns').classList.remove('active');
  document.getElementById('playlistsPanel').classList.remove('hidden');
  document.getElementById('hymnsPanel').classList.add('hidden');
  renderPlaylists();
});

// ── Helper: forEach on NodeList (iOS 9 compat) ───────────────────────
function each(nodeList, fn) {
  Array.prototype.forEach.call(nodeList, fn);
}

// ── Playlists CRUD ────────────────────────────────────────────────────
function renderPlaylists() {
  var container = document.getElementById('playlistsList');
  if (savedPlaylists.length === 0) {
    container.innerHTML = '<div class="pl-empty">No playlists yet.<br>Tap "+ New" to create one.</div>';
    return;
  }

  container.innerHTML = savedPlaylists.map(function(pl, idx) {
    var count = pl.hymns.length;
    var audioCount = 0;
    for (var i = 0; i < pl.hymns.length; i++) {
      var h = hymnByKey(pl.hymns[i]);
      if (h && hasAudio(h)) audioCount++;
    }
    var noAudio = audioCount === 0;
    return '<div class="pl-item" data-idx="' + idx + '">' +
      '<div class="pl-item-top">' +
        '<span class="pl-item-name">' + escHtml(pl.name) + '</span>' +
      '</div>' +
      '<div class="pl-item-meta">' + count + ' hymn' + (count !== 1 ? 's' : '') +
        (audioCount < count ? ' · ' + audioCount + ' with audio' : '') + '</div>' +
      '<div class="pl-item-actions">' +
        '<button class="pl-play" data-idx="' + idx + '"' + (noAudio ? ' disabled' : '') + '>▶ Play</button>' +
        '<button class="pl-edit" data-idx="' + idx + '">✎ Edit</button>' +
        '<button class="pl-delete" data-idx="' + idx + '">🗑</button>' +
      '</div>' +
    '</div>';
  }).join('');

  each(container.querySelectorAll('.pl-play'), function(btn) {
    btn.addEventListener('click', function() {
      var pl = savedPlaylists[parseInt(btn.dataset.idx)];
      unlockAudio();
      startPlaylistPlayback(pl);
    });
  });
  each(container.querySelectorAll('.pl-edit'), function(btn) {
    btn.addEventListener('click', function() {
      startEditPlaylist(parseInt(btn.dataset.idx));
    });
  });
  each(container.querySelectorAll('.pl-delete'), function(btn) {
    btn.addEventListener('click', function() {
      var pl = savedPlaylists[parseInt(btn.dataset.idx)];
      if (confirm('Delete "' + pl.name + '"?')) {
        savedPlaylists.splice(parseInt(btn.dataset.idx), 1);
        savePlaylists();
        renderPlaylists();
      }
    });
  });
}

document.getElementById('newPlaylistBtn').addEventListener('click', function() {
  var name = prompt('Playlist name:');
  if (!name || !name.trim()) return;
  var pl = { id: 'pl_' + Date.now(), name: name.trim(), hymns: [] };
  savedPlaylists.push(pl);
  savePlaylists();
  startEditPlaylist(savedPlaylists.length - 1);
});

function startEditPlaylist(idx) {
  editingPlaylist = savedPlaylists[idx];
  editHymns = editingPlaylist.hymns.slice(); // working copy

  // Switch to Hymns tab in editing mode
  document.getElementById('tabHymns').classList.add('active');
  document.getElementById('tabPlaylists').classList.remove('active');
  document.getElementById('hymnsPanel').classList.remove('hidden');
  document.getElementById('playlistsPanel').classList.add('hidden');

  document.getElementById('editBannerLabel').textContent = 'Editing: ' + editingPlaylist.name;
  document.getElementById('editBanner').classList.add('visible');
  document.getElementById('hymnList').classList.add('editing-mode');
  renderList();
}

function stopEditPlaylist() {
  editingPlaylist = null;
  editHymns = [];
  document.getElementById('editBanner').classList.remove('visible');
  document.getElementById('hymnList').classList.remove('editing-mode');
  renderList();
}

document.getElementById('cancelEditBtn').addEventListener('click', function() {
  stopEditPlaylist();
});

document.getElementById('saveEditBtn').addEventListener('click', function() {
  if (editingPlaylist) {
    editingPlaylist.hymns = editHymns.slice();
    savePlaylists();
  }
  stopEditPlaylist();
  // Go back to playlists tab
  document.getElementById('tabPlaylists').classList.add('active');
  document.getElementById('tabHymns').classList.remove('active');
  document.getElementById('playlistsPanel').classList.remove('hidden');
  document.getElementById('hymnsPanel').classList.add('hidden');
  renderPlaylists();
});

// ── Playlist playback ─────────────────────────────────────────────────
function showHymnsView() {
  // Switch sidebar to Hymns tab and collapse on mobile
  document.getElementById('tabHymns').classList.add('active');
  document.getElementById('tabPlaylists').classList.remove('active');
  document.getElementById('hymnsPanel').classList.remove('hidden');
  document.getElementById('playlistsPanel').classList.add('hidden');
  document.getElementById('sidebar').classList.add('collapsed');
}

function startPlaylistPlayback(pl) {
  var hymns = [];
  for (var i = 0; i < pl.hymns.length; i++) {
    var h = hymnByKey(pl.hymns[i]);
    if (h && hasAudio(h)) hymns.push(h);
  }
  if (hymns.length === 0) return;
  // Reset search and filteredList so all hymns are reachable
  searchInput.value = '';
  filteredList = allHymns;
  renderList();
  showHymnsView();
  activePlayPos = 0;
  playPlaylistItem(0, hymns);
}

function playPlaylistItem(pos, list) {
  var hymn = list[pos];
  if (!hymn) return;
  var idx = allHymns.indexOf(hymn);
  filteredList = allHymns;
  selectHymn(idx);
  var folder = hymn.collection === 'trinity' ? 'midi1' : 'midi2';
  document.getElementById('playerPos').textContent = (pos + 1) + ' / ' + list.length;
  loadMidi(folder + '/h' + hymn.id + '.mid', hymn.firstLine, function() {
    if (pos + 1 < list.length) {
      activePlayPos = pos + 1;
      playPlaylistItem(activePlayPos, list);
    } else {
      document.getElementById('playerPos').textContent = '';
      activePlayPos = -1;
    }
  });
}

// ── Search ────────────────────────────────────────────────────────────
var searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', renderList);
document.getElementById('clearSearch').addEventListener('click', function() { searchInput.value = ''; renderList(); });
document.getElementById('optCase').addEventListener('change', renderList);
document.getElementById('optFirstLine').addEventListener('change', renderList);
document.getElementById('optIgnorePunct').addEventListener('change', renderList);

function normalize(str) {
  var ignorePunct = document.getElementById('optIgnorePunct').checked;
  var caseSensitive = document.getElementById('optCase').checked;
  var s = str;
  if (ignorePunct) s = s.replace(/[^\w\s]/g, '');
  if (!caseSensitive) s = s.toLowerCase();
  return s;
}

function renderList() {
  var query = searchInput.value.trim();
  var firstLineOnly = document.getElementById('optFirstLine').checked;
  var list = document.getElementById('hymnList');
  var source = allHymns;

  if (query) {
    // Hymn number search: query is digits or starts with #
    var numQuery = query.replace(/^#/, '');
    var isNumSearch = /^\d+$/.test(numQuery);

    if (isNumSearch) {
      source = source.filter(function(h) {
        return h.id === numQuery || h.id.indexOf(numQuery) === 0;
      });
    } else {
      var q = normalize(query);
      source = source.filter(function(h) {
        var haystack = firstLineOnly ? normalize(h.firstLine) : normalize(h.text);
        return haystack.indexOf(q) !== -1;
      });
    }
  }

  filteredList = source;

  if (source.length === 0) {
    list.innerHTML = '<div class="no-results">No hymns found</div>';
    return;
  }

  list.innerHTML = source.map(function(h, i) {
    var key = hymnKey(h);
    var isActive = currentIndex !== null && filteredList[currentIndex] === h;
    var isBookmarked = bookmarks[key];
    var editIdx = editingPlaylist ? editHymns.indexOf(key) : -1;
    var inEdit = editIdx !== -1;
    var badge = inEdit ? (editIdx + 1) : '';
    return '<div class="hymn-item' +
      (isActive ? ' active' : '') +
      (isBookmarked ? ' bookmarked' : '') +
      (inEdit ? ' in-edit' : '') +
      '" data-idx="' + i + '">' +
      '<span class="hymn-num">#' + h.id + '</span>' +
      '<span class="hymn-title">' + escHtml(h.firstLine) + '</span>' +
      '<span class="pl-badge">' + badge + '</span>' +
      '</div>';
  }).join('');

  each(list.querySelectorAll('.hymn-item'), function(el) {
    el.addEventListener('click', function() {
      var idx = parseInt(el.dataset.idx);
      if (editingPlaylist) {
        var hymn = filteredList[idx];
        var key = hymnKey(hymn);
        var pos = editHymns.indexOf(key);
        if (pos === -1) editHymns.push(key);
        else editHymns.splice(pos, 1);
        renderList();
      } else {
        selectHymn(idx);
      }
    });
  });
}

function currentHymnKey() {
  if (currentIndex === null || !filteredList[currentIndex]) return null;
  return hymnKey(filteredList[currentIndex]);
}

// ── Hymn viewer ───────────────────────────────────────────────────────
function selectHymn(idx) {
  currentIndex = idx;
  var hymn = filteredList[idx];
  if (!hymn) return;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('hymnView').style.display = 'block';
  document.getElementById('hymnNumber').textContent = 'Hymn #' + hymn.id;
  document.getElementById('hymnTitle').textContent = hymn.firstLine;
  document.getElementById('hymnCollection').textContent =
    hymn.collection === 'trinity' ? 'Trinity Hymnal – Baptist Edition' : 'Grace Hymns';
  document.getElementById('hymnBody').innerHTML = formatLyrics(hymn.text);

  var bkBtn = document.getElementById('bookmarkBtn');
  bkBtn.style.display = '';
  updateBookmarkBtn(hymn);

  document.getElementById('playBtn').style.display = hasAudio(hymn) ? '' : 'none';
  document.getElementById('playBtn').textContent = '▶';

  document.getElementById('mainContent').scrollTop = 0;
  renderList();

  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('collapsed');
  }
}

function formatLyrics(text) {
  return text.split(/\n\n+/).map(function(stanza) {
    return '<div class="stanza">' + escHtml(stanza) + '</div>';
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Prev / Next ───────────────────────────────────────────────────────
document.getElementById('prevHymn').addEventListener('click', function() {
  if (currentIndex > 0) selectHymn(currentIndex - 1);
});
document.getElementById('nextHymn').addEventListener('click', function() {
  if (currentIndex < filteredList.length - 1) selectHymn(currentIndex + 1);
});

// ── Bookmarks ─────────────────────────────────────────────────────────
document.getElementById('bookmarkBtn').addEventListener('click', function() {
  var hymn = filteredList[currentIndex];
  if (!hymn) return;
  var key = hymnKey(hymn);
  if (bookmarks[key]) delete bookmarks[key];
  else bookmarks[key] = true;
  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
  updateBookmarkBtn(hymn);
  renderList();
});

function updateBookmarkBtn(hymn) {
  var key = hymnKey(hymn);
  document.getElementById('bookmarkBtn').textContent = bookmarks[key] ? '★' : '☆';
  document.getElementById('bookmarkBtn').title = bookmarks[key] ? 'Remove bookmark' : 'Bookmark';
}

// ── Font size ─────────────────────────────────────────────────────────
function applyFontSize() {
  document.body.style.fontSize = fontSize + 'px';
}
document.getElementById('fontInc').addEventListener('click', function() {
  fontSize = Math.min(fontSize + 1, 28); applyFontSize(); localStorage.setItem('fontSize', fontSize);
});
document.getElementById('fontDec').addEventListener('click', function() {
  fontSize = Math.max(fontSize - 1, 12); applyFontSize(); localStorage.setItem('fontSize', fontSize);
});

// ── MIDI playback ─────────────────────────────────────────────────────
var midiPlayerLib = null;
var audioContext = null;
var instrument = null;
var isPlaying = false;

// iOS 9 works with the monolithic base64 JS soundfont.
// iOS 12+ rejects data URI audio in decodeAudioData — needs individual files.
// Detect which approach to use based on iOS version.
function getIOSVersion() {
  var ua = navigator.userAgent;
  if (!/iPhone|iPad|iPod/.test(ua)) return null;
  var m = ua.match(/OS (\d+)_/);
  return m ? parseInt(m[1]) : null;
}
var iosVer = getIOSVersion();
// Use manifest (individual MP3s) for iOS 12+, Android, desktop.
// Use legacy base64 JS for iOS < 12 (old iPad/iPhone).
var USE_MANIFEST = (iosVer === null || iosVer >= 12);

function getAudioContext() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  return audioContext;
}

function unlockAudio() {
  var ctx = getAudioContext();
  if (ctx.state === 'suspended') ctx.resume();
  var buf = ctx.createBuffer(1, 1, ctx.sampleRate);
  var src = ctx.createBufferSource();
  src.buffer = buf; src.connect(ctx.destination); src.start(0);
  return ctx;
}

function setPlayerState(playing) {
  isPlaying = playing;
  document.getElementById('playerPlayPause').textContent = playing ? '⏸' : '▶';
}

document.getElementById('playBtn').addEventListener('click', function() {
  var hymn = filteredList[currentIndex];
  if (!hymn) return;
  unlockAudio();
  var folder = hymn.collection === 'trinity' ? 'midi1' : 'midi2';
  loadMidi(folder + '/h' + hymn.id + '.mid', hymn.firstLine, null);
});

document.getElementById('playerPlayPause').addEventListener('click', function() {
  if (!midiPlayerLib) return;
  if (isPlaying) {
    midiPlayerLib.pause(); setPlayerState(false);
  } else {
    unlockAudio(); midiPlayerLib.play(); setPlayerState(true);
  }
});

document.getElementById('playerClose').addEventListener('click', stopMidi);

function stopMidi() {
  if (midiPlayerLib) { midiPlayerLib.stop(); }
  setPlayerState(false);
  document.getElementById('playerBar').classList.remove('visible');
  document.getElementById('playerPos').textContent = '';
  activePlayPos = -1;
}

function loadMidi(src, title, onFinish) {
  stopMidi();
  document.getElementById('playBtn').textContent = '⏳';
  document.getElementById('playBtn').disabled = true;

  var ctx = getAudioContext();
  var playBtn = document.getElementById('playBtn');

  function onError(e) {
    console.error(e);
    playBtn.textContent = '▶'; playBtn.disabled = false;
  }

  function startPlayback(arrayBuf) {
    midiPlayerLib = new MidiPlayer.Player(function(event) {
      if (event.name !== 'Note on' || event.velocity === 0 || !instrument) return;
      var midi = event.noteNumber;
      var nearest = instrument._midiKeys.reduce(function(prev, cur) {
        return Math.abs(cur - midi) < Math.abs(prev - midi) ? cur : prev;
      });
      instrument.start(nearest, ctx.currentTime, {
        gain: event.velocity / 127,
        cents: (midi - nearest) * 100
      });
    });
    midiPlayerLib.on('endOfFile', function() {
      setPlayerState(false);
      if (onFinish) onFinish();
    });
    midiPlayerLib.loadArrayBuffer(arrayBuf);
    midiPlayerLib.play();
    setPlayerState(true);
    document.getElementById('playerTitle').textContent = title;
    document.getElementById('playerBar').classList.add('visible');
    playBtn.textContent = '▶'; playBtn.disabled = false;
  }

  function loadAndPlay() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', src, true);
    xhr.responseType = 'arraybuffer';
    xhr.onload = function() {
      if (xhr.status === 200) startPlayback(xhr.response);
      else onError('MIDI not found');
    };
    xhr.onerror = onError;
    xhr.send();
  }

  if (instrument) {
    loadAndPlay();
  } else if (USE_MANIFEST) {
    // iOS 12+ / Android / desktop: load individual MP3 files via manifest
    Soundfont.instrument(ctx, '/soundfont/manifest.json').then(function(inst) {
      instrument = inst;
      instrument._midiKeys = Object.keys(instrument.buffers).map(Number).sort(function(a,b){return a-b;});
      loadAndPlay();
    }).catch(onError);
  } else {
    // iOS < 12 (old iPad/iPhone): use monolithic base64 JS soundfont
    Soundfont.instrument(ctx, 'acoustic_grand_piano', {
      nameToUrl: function(name, sf, format) { return '/soundfont/' + name + '-' + format + '.js'; },
      format: 'mp3'
    }).then(function(inst) {
      instrument = inst;
      instrument._midiKeys = Object.keys(instrument.buffers).map(Number).sort(function(a,b){return a-b;});
      loadAndPlay();
    }).catch(onError);
  }
}
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}
